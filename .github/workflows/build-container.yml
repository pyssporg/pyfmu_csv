name: Build Container

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Show Podman version
        run: podman --version

      - name: Build build-container image
        run: ./scripts/build_container.sh

      - name: Run build and test pipeline in container
        run: ./scripts/container_build.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyfmu-csv-wheel-linux-x86_64
          path: dist/*.whl
          if-no-files-found: error
