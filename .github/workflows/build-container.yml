name: Build Container

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Show Podman version
        run: podman --version

      - name: Build build-container image
        run: ./scripts/build_container.sh

      - name: Run build and test pipeline in container
        run: ./scripts/container_build.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyfmu-csv-wheel-${{ github.ref_name }}-linux-x86_64
          path: dist/*.whl
          if-no-files-found: error

      - name: Create static latest wheel asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          wheel_path="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"
          test -n "${wheel_path}"
          wheel_name="$(basename "${wheel_path}")"
          IFS='-' read -r dist_name version python_tag abi_tag platform_tag <<< "${wheel_name%.whl}"
          static_name="${dist_name}-0-${python_tag}-${abi_tag}-${platform_tag}.whl"
          cp "${wheel_path}" "dist/${static_name}"

      - name: Publish wheel on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
